name: IHSG Alert

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run IHSG alert
        env:
          TELEGRAM_BOT_TOKENihsg: ${{ secrets.TELEGRAM_BOT_TOKENihsg }}
          TELEGRAM_CHANNEL_IDihsg: ${{ secrets.TELEGRAM_CHANNEL_IDihsg }}
        run: python ihsg_price.py

      - name: Save last price
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_price_ihsg.txt
          git commit -m "update ihsg last price" || echo "no changes"
          git push
